<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="none">
  <!-- Небо с градиентом -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B0E0F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для земли -->
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Небо -->
  <rect width="800" height="400" fill="url(#skyGradient)"/>
  
  <!-- Солнце -->
  <circle cx="700" cy="60" r="40" fill="#FFD700" opacity="0.9"/>
  <circle cx="700" cy="60" r="50" fill="#FFD700" opacity="0.3"/>
  
  <!-- Облака -->
  <g fill="#FFFFFF" opacity="0.8">
    <ellipse cx="100" cy="80" rx="50" ry="25"/>
    <ellipse cx="140" cy="75" rx="40" ry="20"/>
    <ellipse cx="70" cy="85" rx="35" ry="18"/>
    
    <ellipse cx="300" cy="100" rx="45" ry="22"/>
    <ellipse cx="335" cy="95" rx="35" ry="18"/>
    <ellipse cx="270" cy="105" rx="30" ry="15"/>
    
    <ellipse cx="500" cy="70" rx="55" ry="28"/>
    <ellipse cx="545" cy="65" rx="40" ry="20"/>
    <ellipse cx="465" cy="75" rx="35" ry="18"/>
  </g>
  
  <!-- Дальние холмы -->
  <ellipse cx="200" cy="320" rx="250" ry="80" fill="#A8D5BA" opacity="0.6"/>
  <ellipse cx="600" cy="330" rx="300" ry="90" fill="#9BC9A8" opacity="0.5"/>
  
  <!-- Земля -->
  <rect x="0" y="340" width="800" height="60" fill="url(#groundGradient)"/>
  
  <!-- Трава на переднем плане -->
  <g fill="#66BB6A">
    <rect x="0" y="340" width="800" height="10"/>
  </g>
  
  <!-- Декоративные элементы - цветы -->
  <g>
    <circle cx="100" cy="350" r="5" fill="#FF6B9D" opacity="0.8"/>
    <circle cx="150" cy="355" r="4" fill="#FFD93D" opacity="0.8"/>
    <circle cx="250" cy="348" r="5" fill="#FF6B9D" opacity="0.8"/>
    <circle cx="400" cy="352" r="4" fill="#FFD93D" opacity="0.8"/>
    <circle cx="550" cy="350" r="5" fill="#FF6B9D" opacity="0.8"/>
    <circle cx="650" cy="355" r="4" fill="#FFD93D" opacity="0.8"/>
    <circle cx="750" cy="348" r="5" fill="#FF6B9D" opacity="0.8"/>
  </g>
</svg>
