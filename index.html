<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подземелье - Рогалик</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🏰 Подземелье</h1>
        <div class="stats-bar">
            <div class="stat">❤️ HP: <span id="hp">100</span>/<span id="maxHp">100</span></div>
            <div class="stat">⚔️ Атака: <span id="attack">10</span></div>
            <div class="stat">🛡️ Защита: <span id="defense">5</span></div>
            <div class="stat">🏆 Уровень: <span id="level">1</span></div>
            <div class="stat">✨ XP: <span id="xp">0</span>/<span id="nextLevel">50</span></div>
        </div>
        <div class="game-area" id="gameArea"></div>
        <div class="info-panel">
            <div class="floor-info">Этаж: <span id="floor">1</span></div>
            <div class="message-log" id="messageLog"></div>
        </div>
        <p class="instructions">WASD или Стрелки для движения, ПРОБЕЛ для ожидания</p>
        <button id="startBtn">Начать игру</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
